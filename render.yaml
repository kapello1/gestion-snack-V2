services:
  - type: web
    name: gestion-snack-backend
    runtime: docker
    plan: free
    rootDir: Backend_gestion_snack
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api-docs
    envVars:
      - key: DATABASE_URL
        sync: false   # jdbc:postgresql://...neon.tech/neondb?sslmode=require&channel_binding=require&stringtype=unspecified
      - key: DATABASE_USERNAME
        sync: false   # neondb_owner
      - key: DATABASE_PASSWORD
        sync: false   # mot de passe Neon.tech
      - key: APP_BASE_URL
        sync: false   # https://gestion-snack-backend.onrender.com
      - key: ALLOWED_ORIGINS
        sync: false   # https://votre-app.vercel.app
      - key: MAIL_USERNAME
        sync: false   # adresse Gmail d'envoi, ex: gestionsnack.contact@gmail.com
      - key: MAIL_PASSWORD
        sync: false   # App Password Gmail à 16 caractères, SANS les espaces
      - key: FRONTEND_URL
        sync: false   # URL du frontend utilisée dans les liens des emails (vérification / réinitialisation)
      - key: RESEND_API_KEY
        sync: false   # API key Resend (compte gratuit sur https://resend.com - remplace Gmail SMTP)
      - key: RESEND_FROM
        sync: false   # ex: Snack <noreply@votre-domaine.com>  (optionnel, défaut = onboarding@resend.dev)
