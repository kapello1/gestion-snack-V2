# =============================================================
#  Intégration Continue (CI) - Gestion Snack
#  Vérifie à chaque push / pull request sur main que :
#    - le backend Spring Boot compile et se package (JAR)
#    - le frontend React/Vite passe le lint et se build
#  Objectif : garantir qu'aucun code cassé n'arrive sur main.
# =============================================================

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ───────────────────────────────────────────────────────────
  #  Job 1 : Backend Spring Boot (Java 17 / Maven)
  # ───────────────────────────────────────────────────────────
  backend:
    name: Backend - build & package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend_gestion_snack

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Java 17 (Temurin) + cache Maven
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Compiler et packager le JAR
        # -DskipTests : les tests d'intégration nécessitent une base
        # PostgreSQL live (contextLoads démarre tout le contexte Spring).
        # On valide ici la compilation + le packaging, comme le Dockerfile.
        # Un job de test avec service PostgreSQL sera ajouté plus tard.
        run: mvn -B clean package -DskipTests --no-transfer-progress

      - name: Archiver le JAR produit
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: Backend_gestion_snack/target/*.jar
          if-no-files-found: error

  # ───────────────────────────────────────────────────────────
  #  Job 2 : Frontend React / Vite (Node 20)
  # ───────────────────────────────────────────────────────────
  frontend:
    name: Frontend - lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend_gestion_snack

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node 20 + cache npm
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend_gestion_snack/package-lock.json

      - name: Installer les dépendances (lock exact)
        run: npm ci

      - name: Lint (informatif, ne bloque pas le build)
        run: npm run lint
        continue-on-error: true

      - name: Build de production (Vite)
        run: npm run build

      - name: Archiver le dossier dist/
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend_gestion_snack/dist
          if-no-files-found: error
