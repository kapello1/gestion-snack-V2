spring.application.name=gestion_snack

# -------------------------------------------------------
# Base de données PostgreSQL (variables d'environnement)
# - En production (Render): DATABASE_URL, DATABASE_USERNAME, DATABASE_PASSWORD
# - En local: valeurs par défaut ci-dessous
# -------------------------------------------------------
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/gestion_snack?stringtype=unspecified}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuration JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Pool de connexions HikariCP — optimisé pour Neon (PgBouncer)
# IMPORTANT: En production sur Render, utiliser l'URL "Connection Pooling" de Neon
# (port 6543 au lieu de 5432) pour activer le mode transaction de PgBouncer.
# Ex: jdbc:postgresql://<pooler-host>.neon.tech:6543/<db>?sslmode=require
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1

# -------------------------------------------------------
# Cloudinary — stockage des images produits
# -------------------------------------------------------
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# -------------------------------------------------------
# CORS — origines autorisées
# En production: définir ALLOWED_ORIGINS dans Render
# Exemple: https://your-app.vercel.app
# -------------------------------------------------------
allowed.origins=${ALLOWED_ORIGINS:http://localhost:5173}

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# Serveur
server.port=${PORT:8080}
server.servlet.context-path=/

# Logging (moins verbeux en production)
logging.level.com.joel.gestion_snack=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN

# -------------------------------------------------------
# Email — SMTP (Gmail)
# Définir MAIL_USERNAME et MAIL_PASSWORD (App Password Gmail)
# dans les variables d'environnement de Render
# -------------------------------------------------------
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# URL du frontend pour les liens dans les emails
app.frontend-url=${FRONTEND_URL:http://localhost:5173}
