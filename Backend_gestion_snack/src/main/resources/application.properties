spring.application.name=gestion_snack

# -------------------------------------------------------
# Base de données PostgreSQL (variables d'environnement)
# - En production (Render): DATABASE_URL, DATABASE_USERNAME, DATABASE_PASSWORD
# - En local: valeurs par défaut ci-dessous
# -------------------------------------------------------
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/gestion_snack?stringtype=unspecified}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuration JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Pool de connexions HikariCP - Render PostgreSQL
# Render PostgreSQL Hobby autorise 25 connexions, Standard 97
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
# Fail fast (5s) pour éviter l'empilement de threads en attente
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.idle-timeout=180000
spring.datasource.hikari.max-lifetime=300000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1
# Détection de fuites de connexions (connexion non rendue après 60s → log d'alerte)
spring.datasource.hikari.leak-detection-threshold=60000
# Compatibilité PgBouncer/Neon (inoffensif sur Render direct)
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.datasource.hikari.data-source-properties.preferQueryMode=simple

# -------------------------------------------------------
# Cloudinary - stockage des images produits
# -------------------------------------------------------
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# -------------------------------------------------------
# CORS - origines autorisées
# En production: définir ALLOWED_ORIGINS dans Render
# -------------------------------------------------------
allowed.origins=${ALLOWED_ORIGINS:http://localhost:5173}

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# Serveur
server.port=${PORT:8080}
server.servlet.context-path=/

# Logging
logging.level.com.joel.gestion_snack=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
# Hibernate compatibilité Neon / PgBouncer
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# -------------------------------------------------------
# Email - Brevo API (HTTPS/443, jamais bloqué par les hébergeurs)
# Créer un compte gratuit sur https://brevo.com
# BREVO_API_KEY      = clé API Brevo (onglet SMTP & API > API Keys)
# BREVO_FROM_EMAIL   = adresse expéditeur vérifiée dans Brevo (optionnel)
# -------------------------------------------------------
brevo.api-key=${BREVO_API_KEY:}
brevo.from-email=${BREVO_FROM_EMAIL:gestionsnack.contact@gmail.com}

# URL du frontend pour les liens dans les emails
app.frontend-url=${FRONTEND_URL:http://localhost:5173}

# -------------------------------------------------------
# Stripe - paiements en ligne (test & live)
# Récupérer les clés sur https://dashboard.stripe.com/test/apikeys
# -------------------------------------------------------
stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}

# -------------------------------------------------------
# Chargement automatique du fichier .env en développement local
# (optionnel : ignoré si .env absent, inoffensif en production)
# -------------------------------------------------------
spring.config.import=optional:file:.env[.properties]

# -------------------------------------------------------
# Groq - chatbot IA (clé côté SERVEUR, jamais exposée au frontend)
# -------------------------------------------------------
groq.api-key=${GROQ_API_KEY:}
# -------------------------------------------------------
# ElevenLabs - synthèse vocale TTS (clé côté SERVEUR)
# -------------------------------------------------------
elevenlabs.api-key=${ELEVENLABS_API_KEY:}
elevenlabs.voice-id=${ELEVENLABS_VOICE_ID:pNInz6obpgDQGcFmaJgB}
elevenlabs.model-id=${ELEVENLABS_MODEL_ID:eleven_turbo_v2_5}
