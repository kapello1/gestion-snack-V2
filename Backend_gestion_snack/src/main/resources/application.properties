spring.application.name=gestion_snack

# -------------------------------------------------------
# Base de données PostgreSQL (variables d'environnement)
# - En production (Render): DATABASE_URL, DATABASE_USERNAME, DATABASE_PASSWORD
# - En local: valeurs par défaut ci-dessous
# -------------------------------------------------------
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/gestion_snack?stringtype=unspecified}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuration JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Pool de connexions HikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# -------------------------------------------------------
# URL de base du serveur (pour les liens d'images uploadées)
# En production : URL publique Render
# -------------------------------------------------------
app.base.url=${APP_BASE_URL:http://localhost:8080}

# -------------------------------------------------------
# CORS — origines autorisées
# En production: définir ALLOWED_ORIGINS dans Render
# Exemple: https://your-app.vercel.app
# -------------------------------------------------------
allowed.origins=${ALLOWED_ORIGINS:http://localhost:5173}

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# Serveur
server.port=${PORT:8080}
server.servlet.context-path=/

# Logging (moins verbeux en production)
logging.level.com.joel.gestion_snack=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
